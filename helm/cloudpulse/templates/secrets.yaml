apiVersion: v1
kind: Secret
metadata:
  name: cloudpulse-secrets
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "cloudpulse.labels" . | nindent 4 }}
type: Opaque
data:
  POSTGRES_PASSWORD: {{ .Values.secrets.postgresPassword | b64enc | quote }}
  JWT_SECRET: {{ .Values.secrets.jwtSecret | b64enc | quote }}
  admin-user: {{ .Values.secrets.grafanaUser | b64enc | quote }}
  admin-password: {{ .Values.secrets.grafanaPassword | b64enc | quote }}
