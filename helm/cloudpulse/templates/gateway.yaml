apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "cloudpulse.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.gateway.replicas }}
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: {{ include "cloudpulse.image" .Values.images.gateway }}
          imagePullPolicy: {{ .Values.images.gateway.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.gateway.service.port }}
          envFrom:
            - configMapRef:
                name: cloudpulse-config
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: cloudpulse-secrets
                  key: JWT_SECRET
          {{- include "cloudpulse.livenessProbe" (dict "path" "/metrics" "port" .Values.gateway.service.port) | nindent 10 }}
          {{- include "cloudpulse.readinessProbe" (dict "path" "/metrics" "port" .Values.gateway.service.port) | nindent 10 }}
          resources:
            {{- toYaml .Values.gateway.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: {{ .Values.namespace }}
  labels:
    app: gateway
    {{- include "cloudpulse.labels" . | nindent 4 }}
spec:
  ports:
    - name: http
      port: {{ .Values.gateway.service.port }}
  selector:
    app: gateway
