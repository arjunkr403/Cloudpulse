{{- if .Values.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: cloudpulse-monitor
  namespace: {{ .Values.namespace }}
  labels:
    release: {{ .Release.Name }}
    {{- include "cloudpulse.labels" . | nindent 4 }}
spec:
  selector:
    matchExpressions:
      - key: app
        operator: In
        values:
          - gateway
          - health
          - alert
  endpoints:
    - port: http
      path: /metrics
      interval: {{ .Values.serviceMonitor.interval }}
  namespaceSelector:
    matchNames:
      - {{ .Values.namespace }}
{{- end }}
