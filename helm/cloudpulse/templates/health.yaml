apiVersion: apps/v1
kind: Deployment
metadata:
  name: health
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "cloudpulse.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.health.replicas }}
  # RollingUpdate — zero downtime updates.
  # health runs 2+ replicas so we can keep maxUnavailable: 0.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: {{ .Values.selfHealing.health.maxSurge }}
      maxUnavailable: {{ .Values.selfHealing.health.maxUnavailable }}
  selector:
    matchLabels:
      app: health
  template:
    metadata:
      labels:
        app: health
    spec:
      # Always restart crashed containers automatically.
      restartPolicy: {{ .Values.selfHealing.restartPolicy }}
      containers:
        - name: health
          image: {{ include "cloudpulse.image" .Values.images.health }}
          imagePullPolicy: {{ .Values.images.health.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.health.service.port }}
          {{- include "cloudpulse.livenessProbe" (dict "path" "/health" "port" .Values.health.service.port) | nindent 10 }}
          {{- include "cloudpulse.readinessProbe" (dict "path" "/health" "port" .Values.health.service.port) | nindent 10 }}
          resources:
            {{- toYaml .Values.health.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: health
  namespace: {{ .Values.namespace }}
  labels:
    app: health
    {{- include "cloudpulse.labels" . | nindent 4 }}
spec:
  ports:
    - name: http
      port: {{ .Values.health.service.port }}
  selector:
    app: health
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: health-hpa
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "cloudpulse.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: health
  minReplicas: {{ .Values.health.hpa.minReplicas }}
  maxReplicas: {{ .Values.health.hpa.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.health.hpa.cpuUtilization }}
