apiVersion: apps/v1
kind: Deployment
metadata:
  name: health
  namespace: cloudpulse
spec:
  replicas: 2
  selector:
    matchLabels:
      app: health
  template:
    metadata:
      labels:
        app: health
    spec:
      containers:
        - name: health
          image: cloudpulse-health:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3001
          livenessProbe:
            httpGet: { path: /health, port: 3001 }
            initialDelaySeconds: 10
          readinessProbe:
            httpGet: { path: /health, port: 3001 }
            initialDelaySeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: health
  namespace: cloudpulse
spec:
  ports:
    - port: 3001
  selector:
    app: health
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: health-hpa
  namespace: cloudpulse
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: health
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50
