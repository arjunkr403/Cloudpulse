apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: cloudpulse
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
      - name: gateway
        image: cloudpulse-gateway:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
        envFrom:
        - configMapRef:
            name: cloudpulse-config
        env:
        - name: JWT_SECRET
          valueFrom: { secretKeyRef: { name: cloudpulse-secrets, key: JWT_SECRET } }
        livenessProbe:
          httpGet: { path: /metrics, port: 3000 }
          initialDelaySeconds: 10
        readinessProbe:
          httpGet: { path: /metrics, port: 3000 }
          initialDelaySeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: cloudpulse
spec:
  ports:
  - port: 3000
  selector:
    app: gateway
