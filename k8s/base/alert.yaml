apiVersion: apps/v1
kind: Deployment
metadata:
  name: alert
  namespace: cloudpulse
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alert
  template:
    metadata:
      labels:
        app: alert
    spec:
      containers:
        - name: alert
          image: 3takle1212/cloudpulse-alert:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3002
          env:
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: cloudpulse-config
                  key: POSTGRES_USER
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: cloudpulse-config
                  key: POSTGRES_DB
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cloudpulse-secrets
                  key: POSTGRES_PASSWORD
            - name: DATABASE_URL
              value: "postgresql+asyncpg://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@db:5432/$(POSTGRES_DB)"
          livenessProbe:
            httpGet: { path: /metrics, port: 3002 }
            initialDelaySeconds: 10
          readinessProbe:
            httpGet: { path: /metrics, port: 3002 }
            initialDelaySeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: alert
  namespace: cloudpulse
spec:
  ports:
    - port: 3002
  selector:
    app: alert
