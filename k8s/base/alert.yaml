apiVersion: apps/v1
kind: Deployment
metadata:
  name: alert
  namespace: cloudpulse
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alert
  template:
    metadata:
      labels:
        app: alert
    spec:
      containers:
      - name: alert
        image: cloudpulse-alert:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3002
        env:
        - name: DATABASE_URL
          valueFrom: { configMapKeyRef: { name: cloudpulse-config, key: DATABASE_URL } }
        livenessProbe:
          httpGet: { path: /metrics, port: 3002 }
          initialDelaySeconds: 10
        readinessProbe:
          httpGet: { path: /metrics, port: 3002 }
          initialDelaySeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: alert
  namespace: cloudpulse
spec:
  ports:
  - port: 3002
  selector:
    app: alert
